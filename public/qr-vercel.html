<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QRコード - 領収書アプリ（Vercel）</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
body { font-family: sans-serif; text-align: center; padding: 40px; background: #f5f5f5; margin: 0; }
.card { display: inline-block; background: white; padding: 30px 40px; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); margin: 20px auto; }
h2 { color: #333; margin-bottom: 8px; }
p { color: #555; font-size: 14px; }
.url { background: #f0f0f0; padding: 12px 20px; border-radius: 8px; font-family: monospace; font-size: 13px; margin: 16px 0; color: #111; word-break: break-all; }
.note { color: #999; font-size: 12px; margin-top: 12px; }
canvas { display: block; margin: 16px auto; }
.badge { background: #10b981; color: white; font-size: 12px; padding: 4px 12px; border-radius: 20px; display: inline-block; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="card">
  <div class="badge">本番環境 (Vercel)</div>
  <h2>領収書アプリ スマホ接続</h2>
  <p>カメラでQRコードを読み取るか、URLを直接入力してください</p>
  <canvas id="qr"></canvas>
  <div class="url">https://devstudio-damsh7fnl-xedphilias-projects.vercel.app</div>
  <div class="note">※ どのネットワークからでもアクセスできます（WiFi不要）</div>
</div>
<script>
QRCode.toCanvas(document.getElementById('qr'), 'https://devstudio-damsh7fnl-xedphilias-projects.vercel.app', {
  width: 256,
  margin: 2,
  color: { dark: '#000000', light: '#ffffff' }
}, function(error) {
  if (error) console.error(error);
});
</script>
</body>
</html>
